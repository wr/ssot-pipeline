name: linear-replan (reusable)

on:
  workflow_call:
    inputs:
      config_url:
        description: 'Pipeline config Worker URL — set SSOT_WORKER_URL as a GitHub Actions variable on the target repo'
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      LINEAR_APP_TOKEN:
        required: true

jobs:
  replan:
    # cancel-in-progress=true: the newest replan request supersedes any older
    # in-flight replan — the user's most recent feedback is what matters. Safe
    # to cancel because replan only posts a new plan comment and flips state;
    # nothing destructive is in-flight to lose.
    concurrency:
      group: linear-replan-${{ github.event.client_payload.issue_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CONFIG_URL: ${{ inputs.config_url }}
      TRACE: ${{ github.event.client_payload.trace_id }}
      ISSUE: ${{ github.event.client_payload.issue_id }}
      COMMENT_ID: ${{ github.event.client_payload.comment_id }}
    steps:
      - name: Trace
        run: echo "🔗 trace=${TRACE:-<none>} issue=${ISSUE} comment=${COMMENT_ID}"

      - uses: actions/checkout@v6

      - name: Fetch pipeline config
        id: cfg
        uses: wr/ssot-pipeline/.github/actions/fetch-pipeline-config@main
        with:
          config_url: ${{ env.CONFIG_URL }}

      - name: Set issue to Planning state
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          PLANNING_STATE: ${{ steps.cfg.outputs.planning_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
          PLAN_MARKER: ${{ steps.cfg.outputs.plan_marker }}
        run: |
          set -euo pipefail
          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"

          # Single query: UUID + plan comments + team states (combines two prior queries)
          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id comments{nodes{body}} team{states{nodes{id name}}}}}",variables:{id:$id}}')")

          # Defensive: bail fast if Linear returned no .data.issue (most often
          # LINEAR_APP_TOKEN revoked). Exiting here before Claude runs keeps us
          # from wasting API spend on a doomed run.
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi

          PLANNING_UUID=$(echo "$RESP" | jq -r --arg n "$PLANNING_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')
          PLAN_COUNT=$(echo "$RESP" | jq --arg m "$PLAN_MARKER" '.data.issue.comments.nodes | map(select(.body | startswith($m))) | length')

          # Persist for later steps
          echo "ISSUE_UUID=${ISSUE_UUID}" >> "$GITHUB_ENV"
          echo "STUCK_UUID=${STUCK_UUID}" >> "$GITHUB_ENV"
          echo "PLAN_COUNT_BEFORE=${PLAN_COUNT}" >> "$GITHUB_ENV"

          echo "trace=${TRACE} plan_comments_before=${PLAN_COUNT}"

          if [ -z "$PLANNING_UUID" ] || [ "$PLANNING_UUID" = "null" ]; then
            echo "::warning::Planning state '$PLANNING_STATE' not found in team — skipping early flip"
            exit 0
          fi

          curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg id "$ISSUE_UUID" --arg sid "$PLANNING_UUID" '{query:"mutation($id:String!,$sid:String!){issueUpdate(id:$id,input:{stateId:$sid}){success}}",variables:{id:$id,sid:$sid}}')" > /dev/null
          echo "trace=${TRACE} flipped $ISSUE to $PLANNING_STATE"

      - name: Post starting comment
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
        run: |
          set -euo pipefail
          GQL_URL=https://api.linear.app/graphql
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(printf '⚙️ Replanning — [workflow run](%s) _(trace: %s)_' "$RUN_URL" "$TRACE")
          curl -sS -X POST "$GQL_URL" \
            -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg id "$ISSUE_UUID" --arg body "$BODY" '{query:"mutation($id:String!,$body:String!){commentCreate(input:{issueId:$id,body:$body}){success}}",variables:{id:$id,body:$body}}')" > /dev/null
          echo "trace=${TRACE} posted starting comment for $ISSUE"

      - name: Write MCP config
        uses: wr/ssot-pipeline/.github/actions/write-mcp-config@main
        with:
          mcp_url: ${{ steps.cfg.outputs.mcp_url }}
          mcp_transport: ${{ steps.cfg.outputs.mcp_transport }}
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}

      - name: Fetch pipeline plugin
        # Clone into RUNNER_TEMP (outside the workspace). Public repo → no auth
        # needed. Pinned to the default branch (main), matching how target repos
        # consume these workflows via `uses: ...@main`.
        run: |
          set -euo pipefail
          git clone --depth 1 --filter=blob:none --sparse https://github.com/wr/ssot-pipeline "$RUNNER_TEMP/ssot-plugin"
          git -C "$RUNNER_TEMP/ssot-plugin" sparse-checkout set plugins/ssot-agents

      - id: claude
        uses: anthropics/claude-code-action@v1
        env:
          MAX_THINKING_TOKENS: '10000'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stable instructions live in the ssot-agents plugin skill (loaded via
          # --plugin-dir below); this prompt invokes the skill and passes only
          # the per-request context. The skill body substitutes it for $ARGUMENTS.
          prompt: |
            /linear-replan

            Issue ID: ${{ env.ISSUE }}
            Trace ID (for the trailer in step 7): ${{ env.TRACE }}
            User's replan instruction is in comment ID: ${{ env.COMMENT_ID }}
            Plan marker (use verbatim as the first line of your plan comment): ${{ steps.cfg.outputs.plan_marker }}
            In-progress state name (for next_state in_progress): ${{ steps.cfg.outputs.in_progress_state }}
            Plan-review state name (for next_state plan_review): ${{ steps.cfg.outputs.plan_review_state }}
          claude_args: |
            --plugin-dir ${{ runner.temp }}/ssot-plugin/plugins/ssot-agents
            --mcp-config /tmp/mcp.json
            --max-turns 30
            --model claude-sonnet-4-6
            --json-schema '{"type":"object","additionalProperties":false,"required":["next_state","rationale"],"properties":{"next_state":{"type":"string","enum":["in_progress","plan_review"]},"rationale":{"type":"string","maxLength":600}}}'
            --allowedTools "mcp__linear__get_issue" "mcp__linear__list_comments" "mcp__linear__save_comment" "mcp__linear__save_issue" "Read" "Grep" "Glob"
            --disallowedTools "Bash" "Write" "Edit" "WebFetch" "WebSearch" "Read(./.env)" "Read(./.env.*)" "Read(./**/secrets/**)" "Read(./**/.env*)"

      - name: Verify outcome
        id: verify
        if: always()
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          PLAN_MARKER: ${{ steps.cfg.outputs.plan_marker }}
          PLAN_REVIEW_STATE: ${{ steps.cfg.outputs.plan_review_state }}
          IN_PROGRESS_STATE: ${{ steps.cfg.outputs.in_progress_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          set -euo pipefail
          if [ -z "${PLAN_REVIEW_STATE:-}" ]; then
            echo "::warning::No config available, skipping verification"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pick expected state from structured_output (W-132). Default to
          # plan_review — the safer fallback if claude's structured output is
          # missing/garbled: the user is left with an extra approval round
          # rather than the issue silently auto-implementing.
          EXPECT_STATE="$PLAN_REVIEW_STATE"
          SO_NEXT=""
          if [ -n "${STRUCTURED_OUTPUT:-}" ] && echo "$STRUCTURED_OUTPUT" | jq -e . >/dev/null 2>&1; then
            SO_NEXT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.next_state // empty')
            case "$SO_NEXT" in
              in_progress) EXPECT_STATE="$IN_PROGRESS_STATE" ;;
              plan_review) EXPECT_STATE="$PLAN_REVIEW_STATE" ;;
              *) echo "::warning::structured_output.next_state='$SO_NEXT' is not 'in_progress' or 'plan_review' — defaulting to plan_review" ;;
            esac
            echo "structured_output: next_state=$SO_NEXT → expecting $EXPECT_STATE"
          else
            echo "structured_output not present — defaulting to plan_review"
          fi

          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"

          # Single query: state + comments + team states (eliminates the conditional second query)
          QUERY=$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id state{name} comments{nodes{body}} team{states{nodes{id name}}}}}",variables:{id:$id}}')
          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" -d "$QUERY")

          # Defensive: surface the Linear response when .data.issue is null so
          # we get an actionable error rather than jq crashing on the diagnostic
          # path. If we can't reach Linear, we can't flip to Stuck anyway — the
          # ::error:: annotation is the signal.
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi

          STATE=$(echo "$RESP" | jq -r '.data.issue.state.name')
          PLAN_COUNT=$(echo "$RESP" | jq --arg m "$PLAN_MARKER" '.data.issue.comments.nodes | map(select(.body | startswith($m))) | length')
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')

          echo "trace=${TRACE} verify: state=$STATE expected=$EXPECT_STATE plan_comments=$PLAN_COUNT plan_count_before=${PLAN_COUNT_BEFORE:-0}"

          if [ "$STATE" = "$EXPECT_STATE" ] && [ "$PLAN_COUNT" -gt "${PLAN_COUNT_BEFORE:-0}" ]; then
            echo "✓ verification passed (state=$STATE, structured next_state=$SO_NEXT)"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Verification failed — state='$STATE' (expected '$EXPECT_STATE' per structured next_state='$SO_NEXT'), plan_comments=$PLAN_COUNT (before=${PLAN_COUNT_BEFORE:-0})"

          WHAT_FAILED=$(printf -- '- Expected state: `%s` (per structured `next_state: %s`)\n- Actual state: `%s`\n- Plan comments before: %d\n- Plan comments after: %d\n- Claude finished without posting a new plan or leaving the issue in the expected state.' \
            "$EXPECT_STATE" "${SO_NEXT:-<missing>}" "$STATE" "${PLAN_COUNT_BEFORE:-0}" "$PLAN_COUNT")
          {
            echo "needs_stuck=true"
            echo "issue_uuid=${ISSUE_UUID}"
            echo "stuck_uuid=${STUCK_UUID}"
            echo "what_failed<<EOF"
            echo "$WHAT_FAILED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stuck-flip on verify failure
        if: always() && steps.verify.outputs.needs_stuck == 'true'
        uses: wr/ssot-pipeline/.github/actions/linear-stuck-flip@main
        with:
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}
          issue: ${{ env.ISSUE }}
          issue_uuid: ${{ steps.verify.outputs.issue_uuid }}
          stuck_state: ${{ steps.cfg.outputs.stuck_state }}
          stuck_uuid: ${{ steps.verify.outputs.stuck_uuid }}
          trace: ${{ env.TRACE }}
          workflow: linear-replan
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          failure_shapes: replan_no_plan_posted
          what_failed_md: ${{ steps.verify.outputs.what_failed }}

      - name: Exit non-zero if verify failed
        if: always() && steps.verify.outputs.needs_stuck == 'true'
        run: exit 1
