name: linear-pickup (reusable)

on:
  workflow_call:
    inputs:
      config_url:
        description: 'Pipeline config Worker URL — set SSOT_WORKER_URL as a GitHub Actions variable on the target repo'
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      LINEAR_APP_TOKEN:
        required: true

jobs:
  pickup:
    # cancel-in-progress=false: an in-flight pickup may have already posted the
    # plan comment and be mid-state-flip; killing it mid-run risks half-done
    # work. Duplicate dispatches for the same issue serialize and the
    # plan-comment idempotency check short-circuits the redundant ones.
    concurrency:
      group: linear-pickup-${{ github.event.client_payload.issue_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CONFIG_URL: ${{ inputs.config_url }}
      TRACE: ${{ github.event.client_payload.trace_id }}
      ISSUE: ${{ github.event.client_payload.issue_id }}
      # Present only when pickup was triggered from a Linear agent session
      # (delegate/@mention). Empty for the Todo (AI)/comment path, in which case
      # the agent-activity steps below no-op and behavior is unchanged. See W-253.
      AGENT_SESSION_ID: ${{ github.event.client_payload.agent_session_id }}
    steps:
      - name: Trace
        run: echo "🔗 trace=${TRACE:-<none>} issue=${ISSUE} agent_session=${AGENT_SESSION_ID:-<none>}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch pipeline config
        id: cfg
        uses: wr/ssot-pipeline/.github/actions/fetch-pipeline-config@main
        with:
          config_url: ${{ env.CONFIG_URL }}

      - name: Agent session — starting thought
        # No-op unless this run came from an agent session (W-253).
        uses: wr/ssot-pipeline/.github/actions/post-agent-activity@main
        with:
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}
          session_id: ${{ env.AGENT_SESSION_ID }}
          type: thought
          body: "Picking up ${{ env.ISSUE }} — reading the issue and drafting a plan."

      - name: Skip if plan already posted
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          PLAN_MARKER: ${{ steps.cfg.outputs.plan_marker }}
          PLANNING_STATE: ${{ steps.cfg.outputs.planning_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
        run: |
          set -euo pipefail
          # Single query: UUID + plan comments + team states (combines two prior queries)
          GQL_URL=https://api.linear.app/graphql
          QUERY=$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id comments{nodes{id body}} team{states{nodes{id name}}}}}",variables:{id:$id}}')
          RESP=$(curl -sS -X POST "$GQL_URL" \
            -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$QUERY")

          # Defensive: surface the Linear response when .data.issue comes back null
          # so we get an actionable error instead of an opaque jq null-iteration.
          # Most common causes: revoked/scope-limited LINEAR_APP_TOKEN, or Linear
          # API shape change. The response body is logged sans token (the token is
          # in the request header, not the response).
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi
          MARKER_COUNT=$(echo "$RESP" | jq --arg m "$PLAN_MARKER" '.data.issue.comments.nodes | map(select(.body | startswith($m))) | length')
          PLANNING_UUID=$(echo "$RESP" | jq -r --arg n "$PLANNING_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')

          # Persist for later steps
          echo "ISSUE_UUID=${ISSUE_UUID}" >> "$GITHUB_ENV"
          echo "PLANNING_UUID=${PLANNING_UUID}" >> "$GITHUB_ENV"
          echo "STUCK_UUID=${STUCK_UUID}" >> "$GITHUB_ENV"

          echo "trace=${TRACE} idempotency check: plan_comments=$MARKER_COUNT"

          if [ "$MARKER_COUNT" -gt 0 ]; then
            echo "::notice::Plan already posted for $ISSUE — skipping duplicate dispatch (trace=${TRACE})"
            echo "## Duplicate dispatch skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Issue $ISSUE already has $MARKER_COUNT plan comment(s). Exiting without invoking Claude." >> "$GITHUB_STEP_SUMMARY"
            echo "ALREADY_PLANNED=1" >> "$GITHUB_ENV"
          fi

      - name: Flip to Planning (visible feedback)
        if: env.ALREADY_PLANNED != '1'
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
        run: |
          set -euo pipefail
          # ISSUE_UUID and PLANNING_UUID resolved in prior step — no extra GQL query needed
          if [ -z "${PLANNING_UUID:-}" ] || [ "$PLANNING_UUID" = "null" ]; then
            echo "::warning::Planning state not found in team — skipping early flip"
            exit 0
          fi

          GQL_URL=https://api.linear.app/graphql
          curl -sS -X POST "$GQL_URL" \
            -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg id "$ISSUE_UUID" --arg sid "$PLANNING_UUID" '{query:"mutation($id:String!,$sid:String!){issueUpdate(id:$id,input:{stateId:$sid}){success}}",variables:{id:$id,sid:$sid}}')" > /dev/null
          echo "trace=${TRACE} flipped $ISSUE to Planning"

      - name: Write MCP config
        if: env.ALREADY_PLANNED != '1'
        uses: wr/ssot-pipeline/.github/actions/write-mcp-config@main
        with:
          mcp_url: ${{ steps.cfg.outputs.mcp_url }}
          mcp_transport: ${{ steps.cfg.outputs.mcp_transport }}
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}

      - name: Fetch pipeline plugin
        if: env.ALREADY_PLANNED != '1'
        # Clone into RUNNER_TEMP (outside the workspace) so the plugin never
        # risks being swept into a commit by the implement/fix flows. Public
        # repo → no auth needed. Pinned to the default branch (main), matching
        # how target repos consume these workflows via `uses: ...@main`.
        run: |
          set -euo pipefail
          git clone --depth 1 --filter=blob:none --sparse https://github.com/wr/ssot-pipeline "$RUNNER_TEMP/ssot-plugin"
          git -C "$RUNNER_TEMP/ssot-plugin" sparse-checkout set plugins/ssot-agents

      - uses: anthropics/claude-code-action@v1
        if: env.ALREADY_PLANNED != '1'
        id: claude
        env:
          MAX_THINKING_TOKENS: '10000'
          # Opt in to the plugin's Stop-hook early verify (W-233). The hook calls
          # the Worker /verify and blocks once so the agent self-corrects a missed
          # plan/state before the run ends. The if:always() verify step below
          # stays the authoritative backstop. ISSUE + CONFIG_URL come from job env.
          SSOT_VERIFY_KIND: pickup
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stable instructions live in the ssot-agents plugin skill (loaded via
          # --plugin-dir below); this prompt invokes the skill and passes only
          # the per-request context. The skill body substitutes it for $ARGUMENTS.
          prompt: |
            /linear-pickup

            Issue ID: ${{ env.ISSUE }}
            Trace ID (for the trailer): ${{ env.TRACE }}
          claude_args: |
            --plugin-dir ${{ runner.temp }}/ssot-plugin/plugins/ssot-agents
            --mcp-config /tmp/mcp.json
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "mcp__linear__get_issue" "mcp__linear__list_comments" "mcp__linear__save_comment" "mcp__linear__save_issue" "mcp__linear__list_issues" "mcp__linear__get_project" "mcp__linear__list_projects" "mcp__linear__list_documents" "mcp__linear__get_document" "Read" "Grep" "Glob"
            --disallowedTools "Bash" "Write" "Edit" "WebFetch" "WebSearch" "Read(./.env)" "Read(./.env.*)" "Read(./**/secrets/**)" "Read(./**/.env*)"
            --json-schema '{"type":"object","additionalProperties":false,"required":["plan_posted","state_set","plan_summary","ambiguities","complexity"],"properties":{"plan_posted":{"type":"boolean"},"state_set":{"type":"boolean"},"plan_summary":{"type":"string","maxLength":500},"ambiguities":{"type":"array","items":{"type":"string"},"maxItems":20},"complexity":{"type":"string","enum":["S","M","L"]}}}'

      - name: Agent session — post plan as elicitation
        # When triggered from an agent session, surface the just-posted plan as
        # an in-session `elicitation` so the user can approve / request changes
        # in-session (W-253). The plan still lives as the Linear comment, which
        # linear-implement reads. No-op for the Todo (AI)/comment path.
        if: always() && env.AGENT_SESSION_ID != ''
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          PLAN_MARKER: ${{ steps.cfg.outputs.plan_marker }}
        run: |
          set -euo pipefail
          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"
          # Fetch the latest plan-marker comment (the plan Claude just posted).
          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){comments{nodes{body createdAt}}}}",variables:{id:$id}}')")
          PLAN=$(echo "$RESP" | jq -r --arg m "$PLAN_MARKER" '[.data.issue.comments.nodes[] | select(.body | startswith($m))] | sort_by(.createdAt) | last | .body // ""')
          if [ -z "$PLAN" ]; then
            echo "no plan comment found — skipping in-session elicitation (trace=${TRACE})"
            exit 0
          fi
          BODY=$(printf '%s\n\n---\nReply **approve** to build this, or reply with changes.' "$PLAN")
          curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg sid "$AGENT_SESSION_ID" --arg b "$BODY" '{query:"mutation($input: AgentActivityCreateInput!){agentActivityCreate(input:$input){success}}",variables:{input:{agentSessionId:$sid,content:{type:"elicitation",body:$b}}}}')" > /dev/null
          echo "trace=${TRACE} posted plan elicitation to agent session ${AGENT_SESSION_ID}"

      - name: Verify outcome
        id: verify
        if: always()
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          PLAN_MARKER: ${{ steps.cfg.outputs.plan_marker }}
          EXPECT_STATE: ${{ steps.cfg.outputs.plan_review_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          set -euo pipefail
          if [ -z "${EXPECT_STATE:-}" ]; then
            echo "::warning::No config available, skipping verification"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${ALREADY_PLANNED:-}" = "1" ]; then
            echo "✓ verification skipped — duplicate dispatch was deliberately short-circuited"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"

          # Single query: state + comments + team states (eliminates the conditional second query)
          QUERY=$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id state{name} comments{nodes{body}} team{states{nodes{id name}}}}}",variables:{id:$id}}')
          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" -d "$QUERY")

          # Defensive: surface the Linear response when .data.issue is null so we
          # get an actionable error rather than an opaque jq null-iteration on
          # the diagnostic path. Most common cause: revoked LINEAR_APP_TOKEN. If
          # we can't reach Linear, we can't flip to Stuck anyway — the
          # ::error:: annotation is the signal.
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi

          STATE=$(echo "$RESP" | jq -r '.data.issue.state.name')
          MARKER_COUNT=$(echo "$RESP" | jq --arg m "$PLAN_MARKER" '.data.issue.comments.nodes | map(select(.body | startswith($m))) | length')
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')

          # Prefer Claude's structured_output (authoritative: what Claude says it did).
          # Fall back to the descriptive marker/state check (what the world looks like).
          # If structured_output is missing/empty/invalid, we silently fall through to the legacy check.
          SO_PLAN_POSTED=""
          SO_STATE_SET=""
          if [ -n "${STRUCTURED_OUTPUT:-}" ] && echo "$STRUCTURED_OUTPUT" | jq -e . >/dev/null 2>&1; then
            SO_PLAN_POSTED=$(echo "$STRUCTURED_OUTPUT" | jq -r '.plan_posted // empty')
            SO_STATE_SET=$(echo "$STRUCTURED_OUTPUT" | jq -r '.state_set // empty')
            SO_SUMMARY=$(echo "$STRUCTURED_OUTPUT" | jq -r '.plan_summary // empty')
            SO_COMPLEXITY=$(echo "$STRUCTURED_OUTPUT" | jq -r '.complexity // empty')
            SO_AMBIG_COUNT=$(echo "$STRUCTURED_OUTPUT" | jq -r '.ambiguities | length' 2>/dev/null || echo 0)
            echo "structured_output: plan_posted=$SO_PLAN_POSTED state_set=$SO_STATE_SET complexity=$SO_COMPLEXITY ambiguities=$SO_AMBIG_COUNT"
            echo "summary: $SO_SUMMARY"
          else
            echo "structured_output not present — falling back to marker/state grep"
          fi

          echo "trace=${TRACE} verify: state=$STATE expected=$EXPECT_STATE plan_comments=$MARKER_COUNT structured(plan_posted=$SO_PLAN_POSTED state_set=$SO_STATE_SET)"

          # Authoritative path: structured output says both succeeded AND the world agrees on state.
          if [ "$SO_PLAN_POSTED" = "true" ] && [ "$SO_STATE_SET" = "true" ] && [ "$STATE" = "$EXPECT_STATE" ]; then
            echo "✓ verification passed (structured_output + state cross-check)"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback path (no structured output yet, or partial): legacy marker + state check.
          if [ "$STATE" = "$EXPECT_STATE" ] && [ "$MARKER_COUNT" -gt 0 ]; then
            echo "✓ verification passed (marker fallback)"
            echo "needs_stuck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Verification failed — state='$STATE' (expected '$EXPECT_STATE'), plan_comments=$MARKER_COUNT, structured(plan_posted='$SO_PLAN_POSTED' state_set='$SO_STATE_SET')"

          # Stash failure details for the linear-stuck-flip composite below.
          WHAT_FAILED=$(printf -- '- Expected state: `%s`\n- Actual state: `%s`\n- Plan comments found: %d\n- structured_output: plan_posted=`%s` state_set=`%s`\n- Claude finished without leaving the issue in the expected state.' \
            "$EXPECT_STATE" "$STATE" "$MARKER_COUNT" "${SO_PLAN_POSTED:-<empty>}" "${SO_STATE_SET:-<empty>}")
          {
            echo "needs_stuck=true"
            echo "issue_uuid=${ISSUE_UUID}"
            echo "stuck_uuid=${STUCK_UUID}"
            echo "what_failed<<EOF"
            echo "$WHAT_FAILED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stuck-flip on verify failure
        if: always() && steps.verify.outputs.needs_stuck == 'true'
        uses: wr/ssot-pipeline/.github/actions/linear-stuck-flip@main
        with:
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}
          issue: ${{ env.ISSUE }}
          issue_uuid: ${{ steps.verify.outputs.issue_uuid }}
          stuck_state: ${{ steps.cfg.outputs.stuck_state }}
          stuck_uuid: ${{ steps.verify.outputs.stuck_uuid }}
          trace: ${{ env.TRACE }}
          workflow: linear-pickup
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          failure_shapes: pickup_no_plan_posted
          what_failed_md: ${{ steps.verify.outputs.what_failed }}

      - name: Exit non-zero if verify failed
        if: always() && steps.verify.outputs.needs_stuck == 'true'
        run: exit 1
