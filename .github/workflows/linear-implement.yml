name: linear-implement (reusable)

on:
  workflow_call:
    inputs:
      config_url:
        description: 'Pipeline config Worker URL — set SSOT_WORKER_URL as a GitHub Actions variable on the target repo'
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      LINEAR_APP_TOKEN:
        required: true
      # Optional: PAT (or App-installation token) with `Actions: write` on this
      # repo. When present, the verify step can fire `linear-replan` via
      # repository_dispatch for ablatable failure shapes (head-ref mismatch,
      # missing Closes trailer, state mismatch, no PR attached) instead of
      # flipping straight to Stuck. GITHUB_TOKEN cannot trigger another
      # workflow via repository_dispatch — that's why this needs to be its own
      # secret. If unset, auto-replan is skipped and Stuck is the only path.
      GITHUB_DISPATCH_TOKEN:
        required: false

jobs:
  implement:
    # cancel-in-progress=false: an in-flight implement may have already opened
    # the PR, pushed commits, or flipped Linear state — cancelling mid-run
    # leaves partial work and orphaned branches. Duplicate dispatches serialize
    # behind; the verify step's idempotency checks handle the redundancy.
    concurrency:
      group: linear-implement-${{ github.event.client_payload.issue_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      # claude-code-action mints its own GitHub App installation token via OIDC
      # (separate from GITHUB_TOKEN). Default minted scopes don't include
      # `workflows`, so pushes touching .github/workflows/* fail. Asking for it
      # explicitly here is what lets the loop ship workflow-file changes.
      actions: write
    env:
      CONFIG_URL: ${{ inputs.config_url }}
      TRACE: ${{ github.event.client_payload.trace_id }}
      ISSUE: ${{ github.event.client_payload.issue_id }}
    steps:
      - name: Trace
        run: echo "🔗 trace=${TRACE:-<none>} issue=${ISSUE}"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"

      - name: Fetch pipeline config
        id: cfg
        uses: wr/ssot-pipeline/.github/actions/fetch-pipeline-config@main
        with:
          config_url: ${{ env.CONFIG_URL }}

      - name: Flip to In Progress (visible feedback)
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          IN_PROGRESS_STATE: ${{ steps.cfg.outputs.in_progress_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
        run: |
          set -euo pipefail
          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"

          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id team{states{nodes{id name}}}}}",variables:{id:$id}}')")

          # Defensive: bail fast if Linear returned no .data.issue (most often
          # LINEAR_APP_TOKEN revoked). Exiting here before Claude runs keeps us
          # from wasting API spend on a doomed run.
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi

          IN_PROGRESS_UUID=$(echo "$RESP" | jq -r --arg n "$IN_PROGRESS_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')

          # Persist for later steps
          echo "ISSUE_UUID=${ISSUE_UUID}" >> "$GITHUB_ENV"
          echo "STUCK_UUID=${STUCK_UUID}" >> "$GITHUB_ENV"

          if [ -z "$IN_PROGRESS_UUID" ] || [ "$IN_PROGRESS_UUID" = "null" ]; then
            echo "::warning::In Progress state '$IN_PROGRESS_STATE' not found in team — skipping early flip"
            exit 0
          fi

          curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
            -d "$(jq -nc --arg id "$ISSUE_UUID" --arg sid "$IN_PROGRESS_UUID" '{query:"mutation($id:String!,$sid:String!){issueUpdate(id:$id,input:{stateId:$sid}){success}}",variables:{id:$id,sid:$sid}}')" > /dev/null
          echo "trace=${TRACE} flipped $ISSUE to $IN_PROGRESS_STATE"

      - name: Post starting comment
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
        run: |
          set -euo pipefail
          GQL_URL=https://api.linear.app/graphql
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY=$(printf '⚙️ Implementing — [workflow run](%s) _(trace: %s)_' "$RUN_URL" "$TRACE")
          # Capture the start comment id so Claude can thread milestone replies
          # under it. Empty fallback is tolerated by the prompt (posts top-level).
          RESP=$(curl -sS -X POST "$GQL_URL" \
            -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg id "$ISSUE_UUID" --arg body "$BODY" '{query:"mutation($id:String!,$body:String!){commentCreate(input:{issueId:$id,body:$body}){success comment{id}}}",variables:{id:$id,body:$body}}')")
          START_COMMENT_ID=$(echo "$RESP" | jq -r '.data.commentCreate.comment.id // ""')
          echo "START_COMMENT_ID=${START_COMMENT_ID}" >> "$GITHUB_ENV"
          echo "trace=${TRACE} posted starting comment for $ISSUE (id=${START_COMMENT_ID})"

      - name: Write MCP config
        uses: wr/ssot-pipeline/.github/actions/write-mcp-config@main
        with:
          mcp_url: ${{ steps.cfg.outputs.mcp_url }}
          mcp_transport: ${{ steps.cfg.outputs.mcp_transport }}
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}

      - name: Fetch pipeline plugin
        # Clone into RUNNER_TEMP (outside the workspace) so the plugin never
        # risks being swept into a commit by this flow. Public repo → no auth
        # needed. Pinned to the default branch (main), matching how target repos
        # consume these workflows via `uses: ...@main`.
        run: |
          set -euo pipefail
          git clone --depth 1 --filter=blob:none --sparse https://github.com/wr/ssot-pipeline "$RUNNER_TEMP/ssot-plugin"
          git -C "$RUNNER_TEMP/ssot-plugin" sparse-checkout set plugins/ssot-agents

      - uses: anthropics/claude-code-action@v1
        env:
          MAX_THINKING_TOKENS: '10000'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            workflows: write
          # Stable instructions live in the ssot-agents plugin skill (loaded via
          # --plugin-dir below); this prompt invokes the skill and passes only
          # the per-request context. The skill body substitutes it for $ARGUMENTS.
          prompt: |
            /linear-implement

            Issue ID: ${{ env.ISSUE }}
            Trace ID (for trailers and Linear comments): ${{ env.TRACE }}
            Approval comment ID (may be empty): ${{ github.event.client_payload.approval_comment_id }}
            Starting comment ID (parent for milestone replies; may be empty): ${{ env.START_COMMENT_ID }}
          claude_args: |
            --plugin-dir ${{ runner.temp }}/ssot-plugin/plugins/ssot-agents
            --permission-mode bypassPermissions
            --mcp-config /tmp/mcp.json
            --max-turns 60
            --model claude-opus-4-7
            --allowedTools "mcp__linear__get_issue" "mcp__linear__list_comments" "mcp__linear__save_comment" "mcp__linear__save_issue" "mcp__linear__create_attachment" "mcp__github__get_pull_request" "mcp__github__pull_request_read" "mcp__github__list_pull_requests" "Bash" "Read" "Write" "Edit" "Grep" "Glob"
            --disallowedTools "Bash(rm *)" "Bash(rm:*)" "Bash(sudo *)" "Bash(curl *)" "Bash(wget *)" "Bash(nc *)" "Bash(ncat *)" "Bash(ssh *)" "Bash(scp *)" "Bash(rsync *)" "Bash(git push --force*)" "Bash(git push -f*)" "Bash(git push --force-with-lease*)" "Bash(git push --mirror*)" "Bash(git push --delete*)" "Bash(git push *:*)" "Bash(git push * --delete*)" "Bash(git remote add *)" "Bash(git remote set-url *)" "Bash(git reset --hard origin/main*)" "Bash(git update-ref -d *)" "Bash(gh repo delete*)" "Bash(gh repo edit*)" "Bash(gh repo archive*)" "Bash(gh repo create*)" "Bash(gh repo transfer*)" "Bash(gh secret*)" "Bash(gh variable*)" "Bash(gh release delete*)" "Bash(gh workflow disable*)" "Bash(gh workflow enable*)" "Bash(gh api -X DELETE*)" "Bash(gh api --method DELETE*)" "Bash(gh auth*)" "Bash(gh ssh-key*)" "Bash(gh gpg-key*)" "WebFetch" "Read(./.env)" "Read(./.env.*)" "Read(./**/secrets/**)" "Read(./**/.env*)"

      - name: Verify outcome
        id: verify
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          EXPECT_STATE: ${{ steps.cfg.outputs.in_review_state }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
          BRANCH_PREFIX: ${{ steps.cfg.outputs.branch_prefix }}
          GH_DISPATCH_TOKEN: ${{ secrets.GITHUB_DISPATCH_TOKEN }}
          # Auto-replan cap: max total automated retries we'll dispatch for one
          # issue across runs. Counted by scanning prior Stuck-context comments
          # on the issue (magic prefix `## 🚨 Stuck context — trace`). If a
          # human moves the issue back to Todo (AI) they re-enter the loop with
          # the prior context in view — that's the SLO. The auto-replan cap
          # only governs hands-off self-healing inside a single human cycle.
          AUTO_REPLAN_MAX: 2
        run: |
          set -euo pipefail
          if [ -z "${EXPECT_STATE:-}" ]; then
            echo "::warning::No config available, skipping verification"
            echo "outcome=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"

          # Single query: state + attachments + comments + team states. Comments
          # are pulled so we can count prior auto-replan attempts for the cap.
          QUERY=$(jq -nc --arg id "$ISSUE" '{query:"query($id:String!){issue(id:$id){id state{name} attachments{nodes{url}} comments{nodes{body}} team{states{nodes{id name}}}}}",variables:{id:$id}}')
          RESP=$(curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" -d "$QUERY")

          # Defensive: surface the Linear response when .data.issue is null so
          # we get an actionable error rather than jq crashing on the diagnostic
          # path. If we can't reach Linear, we can't flip to Stuck anyway — the
          # ::error:: annotation is the signal.
          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id // ""')
          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::error::Linear GraphQL returned no issue for ${ISSUE} (trace=${TRACE}). Most likely cause: LINEAR_APP_TOKEN revoked or scope-limited. Raw response below."
            echo "$RESP" | jq . || echo "$RESP"
            exit 1
          fi

          STATE=$(echo "$RESP" | jq -r '.data.issue.state.name')
          PR_URLS=$(echo "$RESP" | jq -r '[.data.issue.attachments.nodes[] | select(.url | contains("github.com") and contains("/pull/")) | .url] | .[]')
          PR_COUNT=$(echo "$PR_URLS" | grep -c . || true)
          STUCK_UUID=$(echo "$RESP" | jq -r --arg n "$STUCK_STATE" '.data.issue.team.states.nodes[] | select(.name==$n) | .id')
          # Count prior Stuck-context comments — each one represents a previous
          # verify failure on this issue. Used to enforce AUTO_REPLAN_MAX so we
          # never loop indefinitely.
          PRIOR_STUCK_COUNT=$(echo "$RESP" | jq '[.data.issue.comments.nodes[] | select(.body | startswith("## 🚨 Stuck context — trace"))] | length')

          echo "trace=${TRACE} verify: state=$STATE expected=$EXPECT_STATE pr_attachments=$PR_COUNT prior_stuck_ctx=$PRIOR_STUCK_COUNT"

          FAIL_REASONS=""
          # FAIL_SHAPES is a space-separated list of mechanically-recognizable
          # failure tags. If every failure has a known shape, we treat the run
          # as ablatable and dispatch linear-replan (subject to AUTO_REPLAN_MAX
          # and GITHUB_DISPATCH_TOKEN availability). Any unrecognized failure
          # leaves FAIL_SHAPES with an "unknown" entry and forces Stuck.
          FAIL_SHAPES=""
          if [ "$STATE" != "$EXPECT_STATE" ]; then
            FAIL_REASONS="${FAIL_REASONS}\n- State is \`$STATE\` (expected \`$EXPECT_STATE\`)"
            FAIL_SHAPES="${FAIL_SHAPES} state_mismatch"
          fi
          if [ "$PR_COUNT" -eq 0 ]; then
            FAIL_REASONS="${FAIL_REASONS}\n- No GitHub PR attachment found on issue"
            FAIL_SHAPES="${FAIL_SHAPES} no_pr_attached"
          fi

          # Additional assertions on the attached PR(s): head ref pattern and
          # Closes-trailer must match this issue. ISSUE is like "W-148"; we
          # require head ref to start with `${BRANCH_PREFIX}w-148` (case-insensitive)
          # AND the PR body to contain `Closes W-148` (also case-insensitive).
          # Without these, a Claude run that opens a PR against the wrong issue
          # would silently pass.
          ISSUE_LOWER=$(echo "$ISSUE" | tr '[:upper:]' '[:lower:]')
          EXPECT_HEAD_PREFIX="${BRANCH_PREFIX}${ISSUE_LOWER}"
          HEAD_OK=0
          CLOSES_OK=0
          MATCHED_PR=""
          if [ "$PR_COUNT" -gt 0 ]; then
            while IFS= read -r PR_URL; do
              [ -z "$PR_URL" ] && continue
              # Parse owner/repo/pr_number from URL like https://github.com/o/r/pull/123
              PR_PATH=$(echo "$PR_URL" | sed -E 's#https?://github.com/##; s#/$##')
              PR_OWNER_REPO=$(echo "$PR_PATH" | cut -d/ -f1-2)
              PR_NUM=$(echo "$PR_PATH" | sed -E 's#.*/pull/([0-9]+).*#\1#')
              [ -z "$PR_NUM" ] && continue
              PR_JSON=$(gh api "repos/${PR_OWNER_REPO}/pulls/${PR_NUM}" 2>/dev/null || echo '{}')
              HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref // ""')
              PR_BODY_TXT=$(echo "$PR_JSON" | jq -r '.body // ""')
              echo "  PR #$PR_NUM head=$HEAD_REF"
              # Case-insensitive prefix match. Allow exact match or prefix+'-'.
              HEAD_LOWER=$(echo "$HEAD_REF" | tr '[:upper:]' '[:lower:]')
              if [ "$HEAD_LOWER" = "$EXPECT_HEAD_PREFIX" ] || echo "$HEAD_LOWER" | grep -qE "^${EXPECT_HEAD_PREFIX}(-|$)"; then
                HEAD_OK=1
              fi
              if echo "$PR_BODY_TXT" | grep -qiE "(Closes|Refs)[[:space:]]+${ISSUE}([^0-9]|\$)"; then
                CLOSES_OK=1
              fi
              if [ "$HEAD_OK" = "1" ] && [ "$CLOSES_OK" = "1" ]; then
                MATCHED_PR="$PR_URL"
                break
              fi
            done < <(printf '%s\n' "$PR_URLS")
          fi

          if [ "$PR_COUNT" -gt 0 ] && [ "$HEAD_OK" != "1" ]; then
            FAIL_REASONS="${FAIL_REASONS}\n- No attached PR has head ref matching \`${EXPECT_HEAD_PREFIX}\` (or \`${EXPECT_HEAD_PREFIX}-*\`)"
            FAIL_SHAPES="${FAIL_SHAPES} head_ref_mismatch"
          fi
          if [ "$PR_COUNT" -gt 0 ] && [ "$CLOSES_OK" != "1" ]; then
            FAIL_REASONS="${FAIL_REASONS}\n- No attached PR body contains \`Closes ${ISSUE}\` (or \`Refs ${ISSUE}\`)"
            FAIL_SHAPES="${FAIL_SHAPES} closes_trailer_missing"
          fi

          if [ "$STATE" = "$EXPECT_STATE" ] && [ "$PR_COUNT" -gt 0 ] && [ "$HEAD_OK" = "1" ] && [ "$CLOSES_OK" = "1" ]; then
            echo "✓ verification passed (matched PR: $MATCHED_PR)"
            echo "outcome=passed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Verification failed — see diagnostic below"

          # Classify: every shape in FAIL_SHAPES must be one of the recognized
          # ablatable shapes for the run to qualify for auto-replan.
          ABLATABLE=1
          for shape in $FAIL_SHAPES; do
            case "$shape" in
              head_ref_mismatch|closes_trailer_missing|state_mismatch|no_pr_attached) ;;
              *) ABLATABLE=0 ;;
            esac
          done
          # Empty FAIL_SHAPES with verification failure shouldn't happen, but
          # guard against it: treat as non-ablatable to be safe.
          [ -z "$FAIL_SHAPES" ] && ABLATABLE=0
          # Trim leading space from FAIL_SHAPES for display.
          FAIL_SHAPES_TRIM=$(echo "$FAIL_SHAPES" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+/, /g')

          # Decide between auto-replan and Stuck:
          #   - need at least one ablatable failure shape
          #   - need a dispatch token to actually fire linear-replan
          #   - must be under AUTO_REPLAN_MAX retries on this issue
          NEXT_ATTEMPT=$(( PRIOR_STUCK_COUNT + 1 ))
          DO_REPLAN=0
          REPLAN_SKIP_REASON=""
          if [ "$ABLATABLE" = "1" ]; then
            if [ -z "${GH_DISPATCH_TOKEN:-}" ]; then
              REPLAN_SKIP_REASON="no GITHUB_DISPATCH_TOKEN secret configured on this repo"
            elif [ "$PRIOR_STUCK_COUNT" -ge "$AUTO_REPLAN_MAX" ]; then
              REPLAN_SKIP_REASON="auto-replan cap reached (${PRIOR_STUCK_COUNT}/${AUTO_REPLAN_MAX} prior auto-retries)"
            else
              DO_REPLAN=1
            fi
          else
            REPLAN_SKIP_REASON="failure shape not recognized (one of: ${FAIL_SHAPES_TRIM:-<none>})"
          fi

          NEXT_ACTION_LINE="$( [ "$DO_REPLAN" = "1" ] && echo "dispatching linear-replan (auto-retry $NEXT_ATTEMPT / $AUTO_REPLAN_MAX)" || echo "flipping to Stuck — $REPLAN_SKIP_REASON" )"
          EXTRA_HEADER=$(printf '**Prior auto-retries:** %d / %d' "$PRIOR_STUCK_COUNT" "$AUTO_REPLAN_MAX")

          # Hand off to the next step. Stuck-context comment is posted by the
          # linear-stuck-flip composite (flip_state=false — orchestration below
          # decides whether to flip or dispatch replan).
          {
            echo "outcome=failed"
            echo "issue_uuid=${ISSUE_UUID}"
            echo "stuck_uuid=${STUCK_UUID}"
            echo "fail_shapes=${FAIL_SHAPES_TRIM:-unknown}"
            echo "extra_header=${EXTRA_HEADER}"
            echo "next_action=${NEXT_ACTION_LINE}"
            echo "do_replan=${DO_REPLAN}"
            echo "next_attempt=${NEXT_ATTEMPT}"
            echo "fail_reasons<<EOF"
            printf '%b' "$FAIL_REASONS"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post Stuck-context comment on failure
        id: stuck_comment
        if: always() && steps.verify.outputs.outcome == 'failed'
        uses: wr/ssot-pipeline/.github/actions/linear-stuck-flip@main
        with:
          linear_token: ${{ secrets.LINEAR_APP_TOKEN }}
          issue: ${{ env.ISSUE }}
          issue_uuid: ${{ steps.verify.outputs.issue_uuid }}
          stuck_state: ${{ steps.cfg.outputs.stuck_state }}
          stuck_uuid: ${{ steps.verify.outputs.stuck_uuid }}
          trace: ${{ env.TRACE }}
          workflow: linear-implement
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          failure_shapes: ${{ steps.verify.outputs.fail_shapes }}
          extra_header_md: ${{ steps.verify.outputs.extra_header }}
          next_action_md: ${{ steps.verify.outputs.next_action }}
          what_failed_md: ${{ steps.verify.outputs.fail_reasons }}
          # Defer the state flip — the next step decides between auto-replan
          # (no Stuck flip) and Stuck (flip happens via the fallback step).
          flip_state: 'false'

      - name: Dispatch linear-replan or flip to Stuck
        if: always() && steps.verify.outputs.outcome == 'failed'
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GITHUB_DISPATCH_TOKEN }}
          STUCK_STATE: ${{ steps.cfg.outputs.stuck_state }}
          DO_REPLAN: ${{ steps.verify.outputs.do_replan }}
          NEXT_ATTEMPT: ${{ steps.verify.outputs.next_attempt }}
          AUTO_REPLAN_MAX: 2
          FAIL_SHAPES_TRIM: ${{ steps.verify.outputs.fail_shapes }}
          STUCK_COMMENT_ID: ${{ steps.stuck_comment.outputs.comment_id }}
          ISSUE_UUID: ${{ steps.verify.outputs.issue_uuid }}
          STUCK_UUID: ${{ steps.verify.outputs.stuck_uuid }}
        run: |
          set -euo pipefail
          if [ "$DO_REPLAN" = "1" ] && [ -n "$STUCK_COMMENT_ID" ]; then
            # Fire linear-replan via repository_dispatch. We point comment_id at
            # the Stuck-context comment we just posted; the replan workflow
            # treats it as the "user's replan instruction" — which it is, in
            # spirit (the loop is asking itself to try again, with a stronger
            # prompt about the specific things that broke). Issue state will
            # be flipped to Planning by linear-replan itself.
            DISPATCH_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches"
            PAYLOAD=$(jq -nc \
              --arg issue "$ISSUE" \
              --arg comment "$STUCK_COMMENT_ID" \
              --arg trace "$TRACE" \
              --arg shapes "$FAIL_SHAPES_TRIM" \
              --argjson attempt "$NEXT_ATTEMPT" \
              '{event_type:"linear-replan",client_payload:{issue_id:$issue,comment_id:$comment,trace_id:$trace,prior_failure:$shapes,attempt:$attempt}}')
            HTTP=$(curl -sS -o /tmp/dispatch.out -w '%{http_code}' -X POST "$DISPATCH_URL" \
              -H "Authorization: Bearer ${GH_DISPATCH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$PAYLOAD")
            if [ "$HTTP" = "204" ]; then
              echo "trace=${TRACE} dispatched linear-replan (attempt ${NEXT_ATTEMPT}/${AUTO_REPLAN_MAX}, shapes=${FAIL_SHAPES_TRIM})"
              # Auto-replan dispatched; don't flip to Stuck. linear-replan will
              # take it from here. We still exit 1 so the implement run is
              # marked failed in GitHub Actions (it did fail verification).
              exit 1
            else
              echo "::warning::repository_dispatch to fire linear-replan failed (HTTP ${HTTP}). Falling back to Stuck."
              cat /tmp/dispatch.out || true
              # fall through to Stuck flip below
            fi
          fi

          # Stuck path: either non-ablatable, cap reached, no dispatch token,
          # or dispatch failed. Flip state and bail. (The Stuck-context comment
          # is already posted by the prior step.)
          GQL_URL=https://api.linear.app/graphql
          AUTH="Authorization: Bearer ${LINEAR_APP_TOKEN}"
          CT="Content-Type: application/json"
          if [ -n "$STUCK_UUID" ] && [ "$STUCK_UUID" != "null" ]; then
            curl -sS -X POST "$GQL_URL" -H "$AUTH" -H "$CT" \
              -d "$(jq -nc --arg id "$ISSUE_UUID" --arg sid "$STUCK_UUID" '{query:"mutation($id:String!,$sid:String!){issueUpdate(id:$id,input:{stateId:$sid}){success}}",variables:{id:$id,sid:$sid}}')" > /dev/null
            echo "Moved to Stuck state"
          else
            echo "::warning::Stuck state '$STUCK_STATE' does not exist in this team — skipping state change."
          fi

          exit 1
