name: deploy-worker

on:
  push:
    branches: [main]
    paths:
      - config/pipeline.json
      - worker/**
      - .github/workflows/deploy-worker.yml
  workflow_dispatch:

jobs:
  test:
    # Gate the deploy on the vitest harness (W-146). Worker code paths that
    # previously only got covered by live Linear issues — HMAC, freshness,
    # approval-phrase regex, isStateTransition, resolveRepo, DO dedup — now
    # fail this job loudly before any prod deploy.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Typecheck
        working-directory: worker
        run: npm run typecheck

      - name: Vitest
        working-directory: worker
        run: npm test

  deploy:
    needs: test
    # cancel-in-progress=false: never cancel a deploy mid-`wrangler deploy` —
    # partial deploys can leave the Worker in a broken state. Queued deploys
    # for newer commits serialize behind and run after the current one
    # finishes, so the latest main always ends up live.
    concurrency:
      group: deploy-worker
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Wrangler ≥ 4.x requires Node 22+.
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
