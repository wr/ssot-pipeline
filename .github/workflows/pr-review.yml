name: pr-review (reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} ("${{ github.event.pull_request.title }}").

            Focus on:
            - Correctness bugs and logic errors
            - Security issues (injection, secrets, auth bypass)
            - Adherence to the project's CLAUDE.md conventions
            - Things that would surprise a future reader

            Post findings as inline review comments on specific lines via the GitHub MCP. Group nits into a single summary comment.

            If you find blocking issues, request changes. Otherwise approve with a brief summary.

            Skip stylistic preferences that aren't documented as conventions.
          claude_args: |
            --permission-mode bypassPermissions
            --allowedTools mcp__github__* Bash Read Grep Glob
