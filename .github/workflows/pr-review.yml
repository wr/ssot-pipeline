name: pr-review (reusable)

on:
  workflow_call:
    inputs:
      effort:
        description: 'Review depth: low (fast pass, docs PRs), medium (default), high (security-sensitive or large PRs)'
        type: string
        default: 'medium'
      trace_id:
        description: 'Trace ID for cross-system correlation (generated if not provided)'
        type: string
        default: ''
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      PR: ${{ github.event.pull_request.number }}
      EFFORT: ${{ inputs.effort || 'medium' }}
    steps:
      - name: Trace
        id: trace
        run: |
          TRACE="${{ inputs.trace_id }}"
          [ -z "$TRACE" ] && TRACE=$(openssl rand -hex 4)
          echo "TRACE=$TRACE" >> "$GITHUB_ENV"
          echo "trace=$TRACE" >> "$GITHUB_OUTPUT"
          echo "🔗 pr=#${PR} effort=${EFFORT} trace=${TRACE} title='${{ github.event.pull_request.title }}'"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Skip if PR modifies workflow files
        id: skip_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # claude-code-action's OIDC token exchange rejects PRs whose workflow
          # files differ from main (security: stops a PR from editing the review
          # workflow to leak the app token). Detect that and exit cleanly with a
          # one-time explanatory comment, so workflow-editing PRs get a green
          # check instead of a confusing 401.
          COUNT=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate \
            --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length')
          if [ "$COUNT" = "0" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "::notice::PR modifies $COUNT workflow file(s) — skipping claude review (trace=${TRACE})"
          MARKER="<!-- pr-review-skip:workflows -->"
          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | length")
          if [ "$EXISTING" != "0" ]; then
            echo "Skip notice already posted — not duplicating"
            exit 0
          fi
          BODY=$(printf '%s\n🤖 **pr-review skipped** — this PR modifies `.github/workflows/*`, and `claude-code-action`'"'"'s OIDC token exchange requires workflow files on the PR branch to be byte-identical to `main`. Merge once approved; PRs that do not touch workflows will be reviewed normally. _(trace: %s)_' "$MARKER" "$TRACE")
          gh pr comment "$PR" --repo "$REPO" --body "$BODY"

      - name: Resolve effort settings
        if: steps.skip_check.outputs.skip != 'true'
        id: effort
        run: |
          case "${EFFORT}" in
            low)
              # Sonnet: fast/cheap pass for docs or tiny PRs
              echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
              echo "max_turns=10" >> "$GITHUB_OUTPUT"
              ;;
            high)
              # Opus: deeper reasoning for security-sensitive or large PRs;
              # costs ~3x Sonnet — only use when quality gain justifies it
              echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
              echo "max_turns=30" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # medium (default): Sonnet gives the right cost/latency tradeoff
              # for routine reviews; revisit if Opus quality wins prove worth the spend
              echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
              echo "max_turns=20" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: anthropics/claude-code-action@v1
        if: steps.skip_check.outputs.skip != 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude,github-actions"
          prompt: |
            Review pull request #${{ env.PR }} ("${{ github.event.pull_request.title }}") _(trace: ${{ env.TRACE }})_.

            Before looking at the diff, read the project's CLAUDE.md file to understand its conventions and rules.

            **Check for prior review rounds.** Use `mcp__github__list_pull_request_reviews` and `mcp__github__list_pull_request_review_comments` (or `pull_request_read` with the appropriate method) to see whether `claude[bot]` has already reviewed this PR. If yes, this is a follow-up round, not a first pass — handle it accordingly:
            - Open your review summary with `Round N follow-up — <one-line status>` where status is "previous findings addressed" / "previous findings partially addressed" / "previous findings still unresolved" / "no new changes since prior review".
            - Drop any prior `blocking` finding whose underlying code is no longer present or has been fixed in the current diff. Do NOT re-file it.
            - Re-flag prior `blocking` findings that remain unresolved (the same problematic code still exists at the same place) — note it's a repeat.
            - On top of that, file genuinely NEW findings introduced by the latest commits.
            - If nothing has changed in the diff since the prior review (rare — usually means a no-op push), say so explicitly and APPROVE without re-listing prior findings.

            Label every finding with exactly one severity:
            - `blocking` — must-fix: correctness bug, security issue, or explicit CLAUDE.md violation. Request changes if any exist.
            - `nit` — style or preference not documented as a required convention. Group ALL nits into one summary comment; never post nits inline.
            - `question` — clarifying ask; no action required from the author.

            Skip any finding you are less than 70% confident in. Uncertain findings add noise, not signal.

            Post `blocking` and `question` findings as inline review comments on the specific lines via the GitHub MCP. Post all nits as a single summary comment.

            Approve/reject rule: use REQUEST_CHANGES only if there is at least one `blocking` finding (new or still-unresolved). Otherwise APPROVE with a brief summary of what looks good and all nits grouped at the end.
          claude_args: |
            --permission-mode bypassPermissions
            --allowedTools mcp__github__* Read Grep Glob
            --model ${{ steps.effort.outputs.model }}
            --max-turns ${{ steps.effort.outputs.max_turns }}

      - name: Verify outcome
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SKIP: ${{ steps.skip_check.outputs.skip }}
        run: |
          set -euo pipefail
          if [ "${SKIP:-false}" = "true" ]; then
            echo "✓ verification skipped — PR modifies workflows (claude-code-action OIDC limitation)"
            exit 0
          fi
          REVIEWS=$(gh api "repos/$REPO/pulls/$PR/reviews" --jq '[.[] | select(.user.login == "claude[bot]")] | length')
          echo "claude[bot] reviews on PR #$PR: $REVIEWS"
          if [ "$REVIEWS" -gt 0 ]; then
            echo "✓ verification passed"
            exit 0
          fi
          echo "::error::Verification failed — claude[bot] did not post a review on PR #$PR"
          exit 1
