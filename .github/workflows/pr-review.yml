name: pr-review (reusable)

on:
  workflow_call:
    inputs:
      effort:
        description: 'Review depth: low (fast pass, docs PRs), medium (default), high (security-sensitive or large PRs)'
        type: string
        default: 'medium'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      PR: ${{ github.event.pull_request.number }}
      EFFORT: ${{ inputs.effort || 'medium' }}
    steps:
      - name: Trace
        run: echo "🔗 pr=#${PR} effort=${EFFORT} title='${{ github.event.pull_request.title }}'"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve effort settings
        id: effort
        run: |
          case "${EFFORT}" in
            low)
              # Sonnet: fast/cheap pass for docs or tiny PRs
              echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
              echo "max_turns=10" >> "$GITHUB_OUTPUT"
              ;;
            high)
              # Opus: deeper reasoning for security-sensitive or large PRs;
              # costs ~3x Sonnet — only use when quality gain justifies it
              echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
              echo "max_turns=30" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # medium (default): Sonnet gives the right cost/latency tradeoff
              # for routine reviews; revisit if Opus quality wins prove worth the spend
              echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
              echo "max_turns=20" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude,github-actions"
          prompt: |
            Review pull request #${{ env.PR }} ("${{ github.event.pull_request.title }}").

            Before looking at the diff, read the project's CLAUDE.md file to understand its conventions and rules.

            Label every finding with exactly one severity:
            - `blocking` — must-fix: correctness bug, security issue, or explicit CLAUDE.md violation. Request changes if any exist.
            - `nit` — style or preference not documented as a required convention. Group ALL nits into one summary comment; never post nits inline.
            - `question` — clarifying ask; no action required from the author.

            Skip any finding you are less than 70% confident in. Uncertain findings add noise, not signal.

            Post `blocking` and `question` findings as inline review comments on the specific lines via the GitHub MCP. Post all nits as a single summary comment.

            Approve/reject rule: use REQUEST_CHANGES only if there is at least one `blocking` finding. Otherwise APPROVE with a brief summary of what looks good and all nits grouped at the end.
          claude_args: |
            --permission-mode bypassPermissions
            --allowedTools mcp__github__* Read Grep Glob
            --model ${{ steps.effort.outputs.model }}
            --max-turns ${{ steps.effort.outputs.max_turns }}

      - name: Verify outcome
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REVIEWS=$(gh api "repos/$REPO/pulls/$PR/reviews" --jq '[.[] | select(.user.login == "claude[bot]")] | length')
          echo "claude[bot] reviews on PR #$PR: $REVIEWS"
          if [ "$REVIEWS" -gt 0 ]; then
            echo "✓ verification passed"
            exit 0
          fi
          echo "::error::Verification failed — claude[bot] did not post a review on PR #$PR"
          exit 1
