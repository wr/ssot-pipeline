name: pr-merge (reusable)

on:
  workflow_call:
    secrets:
      LINEAR_APP_TOKEN:
        required: true

jobs:
  merge:
    concurrency:
      group: pr-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    # Only proceed for human approvals from the maintainer
    if: github.event.review.user.login == 'wr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@v4

      - name: Wait for checks and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Wait briefly for any in-flight checks to settle
          gh pr checks "$PR" --watch --interval 15 || {
            echo "::warning::Some checks not passing. Posting comment and bailing."
            gh pr comment "$PR" --body "Approval received but checks aren't all green. Not auto-merging."
            exit 0
          }

          gh pr merge "$PR" --squash --delete-branch --auto

      - name: Extract Linear issue from PR body
        id: linear
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(gh pr view "$PR" --json body --jq '.body')
          ISSUE=$(echo "$BODY" | grep -oE 'Refs[: ]+[A-Z]+-[0-9]+' | head -1 | grep -oE '[A-Z]+-[0-9]+' || true)
          echo "issue=${ISSUE}" >> "$GITHUB_OUTPUT"
          echo "Detected Linear issue: ${ISSUE:-<none>}"

      - name: Mark Linear issue Done
        if: steps.linear.outputs.issue != ''
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
          ISSUE: ${{ steps.linear.outputs.issue }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          # Resolve issue UUID + workflow state UUID for "Done", then update
          QUERY=$(cat <<EOF
          {
            "query": "query(\$id: String!) { issue(id: \$id) { id team { states(filter: {name: {eq: \"Done\"}}) { nodes { id } } } } }",
            "variables": {"id": "${ISSUE}"}
          }
          EOF
          )

          RESP=$(curl -sS -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$QUERY")

          ISSUE_UUID=$(echo "$RESP" | jq -r '.data.issue.id')
          STATE_UUID=$(echo "$RESP" | jq -r '.data.issue.team.states.nodes[0].id')

          if [ -z "$ISSUE_UUID" ] || [ "$ISSUE_UUID" = "null" ]; then
            echo "::warning::Could not resolve Linear issue $ISSUE"
            exit 0
          fi

          MUTATION=$(cat <<EOF
          {
            "query": "mutation(\$id: String!, \$stateId: String!) { issueUpdate(id: \$id, input: {stateId: \$stateId}) { success } }",
            "variables": {"id": "${ISSUE_UUID}", "stateId": "${STATE_UUID}"}
          }
          EOF
          )

          curl -sS -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$MUTATION" | jq .

          # Post a confirmation comment
          COMMENT=$(cat <<EOF
          {
            "query": "mutation(\$id: String!, \$body: String!) { commentCreate(input: {issueId: \$id, body: \$body}) { success } }",
            "variables": {"id": "${ISSUE_UUID}", "body": "Shipped via ${PR_URL}"}
          }
          EOF
          )

          curl -sS -X POST https://api.linear.app/graphql \
            -H "Authorization: ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT" | jq .
