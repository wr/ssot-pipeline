name: credential-canary

# Proactively verify the loop's long-lived credentials so a dead token surfaces
# as a loud failure (GitHub emails the repo owner on a failed scheduled run —
# an alert channel independent of the creds being tested) instead of a silent
# multi-hour outage. Born from the 2026-05-29 incident where three creds rotted
# overnight and the loop failed invisibly (W-282; see W-273/W-274, W-280).
#
# A failed run = at least one credential is dead. The ::error:: annotation names
# which one and how to fix it.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: LINEAR_APP_TOKEN — authenticates as the actor=app user
        env:
          LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${LINEAR_APP_TOKEN:-}" ]; then
            echo "::error::LINEAR_APP_TOKEN secret is empty/unset on this repo."
            exit 1
          fi
          RESP=$(curl -sS -X POST https://api.linear.app/graphql \
            -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ viewer { id name } }"}')
          NAME=$(echo "$RESP" | jq -r '.data.viewer.name // ""')
          if [ "$NAME" != "claude" ]; then
            echo "::error::LINEAR_APP_TOKEN is dead or not the actor=app user (viewer.name='${NAME}'). Mint a fresh token (bin/get-linear-token) and rotate everywhere (bin/rotate-linear-token.sh). Linear response:"
            echo "$RESP" | jq -c '.errors // .data // .' || echo "$RESP"
            exit 1
          fi
          echo "✓ LINEAR_APP_TOKEN authenticates as: ${NAME}"

      - name: Reviewer/dispatch App — private key is valid
        id: app
        # Fails loudly ("JSON web token could not be decoded") if the key is
        # malformed/revoked. pr-review AND the Worker's dispatch identity both
        # depend on this App (id in CLAUDE_REVIEWER_APP_ID).
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
          private-key: ${{ secrets.CLAUDE_REVIEWER_APP_KEY }}

      - name: Reviewer/dispatch App — minted token works
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_REVIEWER_APP_* failed to mint an installation token (bad/revoked private key). pr-review and the Worker's repository_dispatch both rely on this App."
            exit 1
          fi
          gh api repos/${GITHUB_REPOSITORY} -q '.full_name' >/dev/null
          echo "✓ Reviewer/dispatch App minted a working installation token"

      - name: GITHUB_DISPATCH_TOKEN — PAT fallback still valid (warn only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GITHUB_DISPATCH_TOKEN not set — fine, the App is primary now."
            exit 0
          fi
          if gh api repos/${GITHUB_REPOSITORY} -q '.full_name' >/dev/null 2>&1; then
            echo "✓ GITHUB_DISPATCH_TOKEN (PAT fallback) is valid"
          else
            echo "::warning::GITHUB_DISPATCH_TOKEN PAT looks invalid. The App is primary so dispatch still works, but the fallback is dead — rotate or remove it."
          fi
