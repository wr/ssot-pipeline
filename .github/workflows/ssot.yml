name: ssot

on:
  repository_dispatch:
    types: [linear-pickup]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  linear-pickup:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'linear-pickup'
    uses: ./.github/workflows/linear-pickup.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
