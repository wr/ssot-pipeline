# Post a Linear agent-session activity (thought / action / response /
# elicitation / error) via the agentActivityCreate GraphQL mutation, using the
# Linear app token — the same trusted-YAML-step pattern as the "Flip to
# Planning" / "Post starting comment" steps (NOT routed through Claude's
# restricted tool set).
#
# No-op when session_id is empty, so workflows can call it unconditionally:
# events that came through the Todo (AI) / comment path carry no agent session
# id and simply skip, leaving that path's behavior unchanged. See W-253.
name: Post agent activity
description: 'Post a Linear agent-session activity via agentActivityCreate. No-op when session_id is empty.'

inputs:
  linear_token:
    description: 'Linear OAuth app token (LINEAR_APP_TOKEN secret).'
    required: true
  session_id:
    description: 'Agent session id. When empty, the step is a no-op.'
    required: false
    default: ''
  type:
    description: 'Activity type: thought | response | elicitation | error (body-shaped content), or action ({action, result?}-shaped — pass the action label in `body` and an optional outcome in `result`).'
    required: true
  body:
    description: 'For body-shaped types, the activity text. For type=action, the action label (maps to Linear content.action).'
    required: true
  result:
    description: 'Optional outcome string for type=action (content.result), e.g. a PR URL. Ignored for body-shaped types.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Post agent activity
      shell: bash
      env:
        LINEAR_APP_TOKEN: ${{ inputs.linear_token }}
        SESSION_ID: ${{ inputs.session_id }}
        ACT_TYPE: ${{ inputs.type }}
        ACT_BODY: ${{ inputs.body }}
        ACT_RESULT: ${{ inputs.result }}
      run: |
        set -euo pipefail
        if [ -z "${SESSION_ID:-}" ]; then
          echo "post-agent-activity: no session id — skipping ($ACT_TYPE)"
          exit 0
        fi
        # action activities use {action, result?} content; the others use {body}.
        if [ "$ACT_TYPE" = "action" ]; then
          CONTENT=$(jq -nc --arg a "$ACT_BODY" --arg r "${ACT_RESULT:-}" \
            'if $r == "" then {type:"action",action:$a} else {type:"action",action:$a,result:$r} end')
        else
          CONTENT=$(jq -nc --arg t "$ACT_TYPE" --arg b "$ACT_BODY" '{type:$t,body:$b}')
        fi
        GQL_URL=https://api.linear.app/graphql
        QUERY=$(jq -nc --arg sid "$SESSION_ID" --argjson content "$CONTENT" \
          '{query:"mutation($input: AgentActivityCreateInput!){agentActivityCreate(input:$input){success}}",variables:{input:{agentSessionId:$sid,content:$content}}}')
        RESP=$(curl -sS -X POST "$GQL_URL" \
          -H "Authorization: Bearer ${LINEAR_APP_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$QUERY")
        # Best-effort: log success/errors, never fail the workflow on a missed activity.
        OK=$(echo "$RESP" | jq -r '.data.agentActivityCreate.success // empty')
        if [ "$OK" = "true" ]; then
          echo "post-agent-activity: posted $ACT_TYPE to session $SESSION_ID"
        else
          echo "::warning::post-agent-activity: $ACT_TYPE not confirmed — $(echo "$RESP" | jq -c '.errors // .data // "no body"')"
        fi
