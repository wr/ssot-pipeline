# ssot-pipeline target-repo stub. Generated by `init-target-repo.sh`.
# Don't edit this directly — re-run init-target-repo.sh if anything needs to change.
# ssot-pipeline version: 6
#
# v6 (2026-05-26): linear-implement now accepts an optional
#   GITHUB_DISPATCH_TOKEN secret. When set, the verify step auto-dispatches
#   linear-replan (max 2 retries) on recognized failure shapes — head-ref
#   mismatch, missing Closes trailer, state mismatch, no PR attached —
#   instead of flipping straight to Stuck. Stuck flips across all workflows
#   now post a structured `## 🚨 Stuck context — trace <id>` comment so the
#   next pickup has memory of what just broke.
# v5 (2026-05-26): config_url input now hard-required; callers MUST pass
#   `with: config_url: ${{ vars.SSOT_WORKER_URL }}` on every job. Re-run
#   init-target-repo.sh on any repo still on v4.
#
# Required repo secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  Claude Max OAuth token (set by /install-github-app)
#   LINEAR_APP_TOKEN         Linear OAuth app token (actor=app), so claude appears as @claude
#   CLAUDE_REVIEWER_APP_ID   GitHub App ID for your reviewer App (review identity, distinct from claude[bot] so APPROVE/REQUEST_CHANGES isn't blocked as self-review; see docs/github-app-setup.md)
#   CLAUDE_REVIEWER_APP_KEY  Private key (PEM) for the same App
# Optional repo secrets:
#   GITHUB_DISPATCH_TOKEN    Fine-grained PAT (Actions: write on this repo). When
#                            set, linear-implement's verify step can auto-fire
#                            linear-replan on recognized verify failures
#                            instead of going straight to Stuck. The default
#                            GITHUB_TOKEN cannot trigger workflows via
#                            repository_dispatch — this is why we need a
#                            separate PAT. Safe to omit (Stuck still works).
#
# Required Linear setup:
#   - Issue state "Plan Review" must exist in the Personal team
#   - "claude" Linear OAuth app webhook must point at the Worker, scoped to this project
#   - The Worker's LINEAR_PROJECT_TO_REPO mapping must include this repo

name: ssot

on:
  repository_dispatch:
    types: [linear-pickup, linear-implement, linear-replan]
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

# GITHUB_TOKEN permissions. Reusable workflows can only request <= what the
# caller grants — keep this block aligned with the union of needs across all
# linear-* and pr-review reusables. Missing a scope here = startup_failure.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write   # required: linear-implement.yml pushes .github/workflows/* changes

jobs:
  linear-pickup:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'linear-pickup'
    uses: __SSOT_REPO__/.github/workflows/linear-pickup.yml@main
    with:
      config_url: ${{ vars.SSOT_WORKER_URL }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}

  linear-implement:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'linear-implement'
    uses: __SSOT_REPO__/.github/workflows/linear-implement.yml@main
    with:
      config_url: ${{ vars.SSOT_WORKER_URL }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
      # Optional. When set, verify-step auto-replan on known failure shapes
      # is enabled. Safe to leave unset — Stuck still works as the fallback.
      GITHUB_DISPATCH_TOKEN: ${{ secrets.GITHUB_DISPATCH_TOKEN }}

  linear-replan:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'linear-replan'
    uses: __SSOT_REPO__/.github/workflows/linear-replan.yml@main
    with:
      config_url: ${{ vars.SSOT_WORKER_URL }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}

  pr-review:
    if: github.event_name == 'pull_request'
    uses: __SSOT_REPO__/.github/workflows/pr-review.yml@main
    with:
      config_url: ${{ vars.SSOT_WORKER_URL }}
      effort: medium  # low | medium | high — adjust per repo or override per PR
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_REVIEWER_APP_ID: ${{ secrets.CLAUDE_REVIEWER_APP_ID }}
      CLAUDE_REVIEWER_APP_KEY: ${{ secrets.CLAUDE_REVIEWER_APP_KEY }}

  pr-fix:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
    uses: __SSOT_REPO__/.github/workflows/pr-fix.yml@main
    with:
      config_url: ${{ vars.SSOT_WORKER_URL }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      LINEAR_APP_TOKEN: ${{ secrets.LINEAR_APP_TOKEN }}
